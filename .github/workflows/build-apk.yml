name: Friday APK Derle

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper jar'ı tamamla (eksikse)
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar bulunamadı, mevcut Gradle ile tamamlanıyor..."
            gradle wrapper --gradle-version 8.7
          fi

      - name: Gradle wrapper'a calistirma izni ver
        run: chmod +x ./gradlew

      - name: Debug APK derle
        run: ./gradlew assembleDebug

      - name: APK'yi indirilebilir hale getir
        uses: actions/upload-artifact@v4
        with:
          name: friday-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
